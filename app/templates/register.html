{% extends "base.html" %}

{% block title %}Регистрация | NeTvoyoDelo{% endblock %}

{% block extra_css %}
<style>
    .register-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    
    .register-card {
        max-width: 640px;
        width: 100%;
        background: var(--bg-card);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        transition: var(--transition);
        border: 1px solid var(--border-light);
    }
    
    .register-card:hover {
        box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.15);
    }
    
    .register-header {
        background: var(--primary);
        padding: 2rem 2rem 1.75rem;
        text-align: center;
        color: white;
        position: relative;
        overflow: hidden;
    }
    
    .register-header::before {
        content: '';
        position: absolute;
        top: -30%;
        right: -20%;
        width: 200px;
        height: 200px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        pointer-events: none;
    }
    
    .register-header::after {
        content: '';
        position: absolute;
        bottom: -30%;
        left: -20%;
        width: 180px;
        height: 180px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        pointer-events: none;
    }
    
    .register-icon {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: var(--transition);
    }
    
    .register-icon svg {
        width: 32px;
        height: 32px;
        stroke: white;
        stroke-width: 1.6;
    }
    
    .register-header h2 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        letter-spacing: -0.3px;
    }
    
    .register-header p {
        font-size: 0.85rem;
        opacity: 0.85;
        margin: 0;
        font-weight: 400;
    }
    
    .register-body {
        padding: 2rem;
    }
    
    .form-group {
        margin-bottom: 1.25rem;
    }
    
    .form-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
    }
    
    .form-group label .required {
        color: var(--danger);
        margin-left: 0.25rem;
    }
    
    .form-control {
        width: 100%;
        padding: 0.7rem 1rem;
        background: var(--bg-main);
        border: 1.5px solid var(--border-light);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-size: 0.9rem;
        transition: var(--transition);
        font-weight: 450;
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: var(--shadow-focus);
    }
    
    select.form-control {
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 1rem center;
        background-size: 1rem;
    }
    
    .input-icon {
        position: relative;
    }
    
    .input-icon svg {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        stroke: var(--text-muted);
        pointer-events: none;
        transition: stroke 0.2s;
    }
    
    .input-icon .form-control {
        padding-left: 2.75rem;
    }
    
    .input-icon .form-control:focus + svg {
        stroke: var(--primary);
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }
    
    .alert-error {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.875rem 1rem;
        background: linear-gradient(135deg, rgba(220, 38, 38, 0.08), rgba(220, 38, 38, 0.04));
        color: var(--danger);
        border-radius: var(--radius-md);
        margin-bottom: 1.5rem;
        border-left: 3px solid var(--danger);
        font-size: 0.85rem;
        font-weight: 500;
    }
    
    .alert-error svg {
        width: 18px;
        height: 18px;
        stroke: var(--danger);
        flex-shrink: 0;
    }
    
    .btn-register {
        width: 100%;
        padding: 0.875rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
    
    .btn-register:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }
    
    .btn-register:active {
        transform: translateY(0);
    }
    
    .btn-register svg {
        width: 18px;
        height: 18px;
        stroke: white;
        stroke-width: 2;
    }
    
    .register-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-light);
    }
    
    .register-footer a {
        color: var(--primary);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
    }
    
    .register-footer a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
    }
    
    .register-footer svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
    }
    
    /* Стили для валидации */
    .form-control.error {
        border-color: var(--danger);
    }
    
    .error-message {
        font-size: 0.7rem;
        color: var(--danger);
        margin-top: 0.25rem;
        display: block;
    }
    
    /* Password strength indicator */
    .password-strength {
        margin-top: 0.5rem;
        height: 4px;
        background: var(--border-light);
        border-radius: 2px;
        overflow: hidden;
    }
    
    .strength-bar {
        height: 100%;
        width: 0%;
        transition: width 0.3s ease, background 0.3s ease;
        border-radius: 2px;
    }
    
    .strength-weak { background: var(--danger); width: 33%; }
    .strength-medium { background: var(--warning); width: 66%; }
    .strength-strong { background: var(--success); width: 100%; }
    
    /* Адаптивность */
    @media (max-width: 680px) {
        .register-container {
            padding: 1rem;
        }
        
        .register-header {
            padding: 1.5rem;
        }
        
        .register-body {
            padding: 1.5rem;
        }
        
        .form-row {
            grid-template-columns: 1fr;
            gap: 0;
        }
        
        .register-icon {
            width: 52px;
            height: 52px;
        }
        
        .register-icon svg {
            width: 26px;
            height: 26px;
        }
    }
    
    @media (max-width: 480px) {
        .form-group label {
            font-size: 0.7rem;
        }
        
        .form-control {
            font-size: 0.85rem;
            padding: 0.6rem 0.85rem;
        }
        
        .input-icon .form-control {
            padding-left: 2.5rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <div class="register-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h2>Регистрация</h2>
            <p>Создайте учетную запись для доступа к системе</p>
        </div>
        
        <div class="register-body">
            {% if error %}
            <div class="alert-error">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <form action="/api/auth/register" method="POST" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                            <input type="email" id="email" name="email" class="form-control" placeholder="name@company.ru" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="username">Логин <span class="required">*</span></label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input type="text" id="username" name="username" class="form-control" placeholder="username" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="full_name">Полное имя <span class="required">*</span></label>
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M4 4h16v16H4z"/>
                            <path d="M8 8h8M8 12h6M8 16h4"/>
                        </svg>
                        <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Иванов Иван Иванович" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Пароль <span class="required">*</span></label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Минимум 6 символов" required>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">Подтверждение <span class="required">*</span></label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Повторите пароль" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="department">Отдел <span class="required">*</span></label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H4a2 2 0 0 1-2-2z"/>
                            </svg>
                            <select id="department" name="department" class="form-control" required>
                                <option value="">Выберите отдел</option>
                                {% for dept in departments %}
                                <option value="{{ dept }}">{{ dept }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone_number">Телефон</label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.574 2.81.7A2 2 0 0 1 22 16.92z"/>
                            </svg>
                            <input type="tel" id="phone_number" name="phone_number" class="form-control" placeholder="+7 (XXX) XXX-XX-XX">
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-register">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                    Создать аккаунт
                </button>
            </form>
            
            <div class="register-footer">
                <a href="/api/auth/login">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.5 12H3"/>
                    </svg>
                    Уже есть аккаунт? Войти
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Валидация пароля и индикатор сложности
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const strengthBar = document.getElementById('strengthBar');
    
    function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        
        if (password.length === 0) return 0;
        if (strength <= 2) return 1;
        if (strength <= 3) return 2;
        return 3;
    }
    
    function updateStrengthIndicator() {
        const password = passwordInput.value;
        const strength = checkPasswordStrength(password);
        
        strengthBar.className = 'strength-bar';
        if (strength === 1) {
            strengthBar.classList.add('strength-weak');
        } else if (strength === 2) {
            strengthBar.classList.add('strength-medium');
        } else if (strength === 3) {
            strengthBar.classList.add('strength-strong');
        } else {
            strengthBar.style.width = '0%';
        }
    }
    
    function validatePasswordMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        if (confirm.length > 0 && password !== confirm) {
            confirmInput.setCustomValidity('Пароли не совпадают');
            confirmInput.classList.add('error');
        } else {
            confirmInput.setCustomValidity('');
            confirmInput.classList.remove('error');
        }
    }
    
    passwordInput.addEventListener('input', () => {
        updateStrengthIndicator();
        validatePasswordMatch();
    });
    
    confirmInput.addEventListener('input', validatePasswordMatch);
    
    // Валидация формы перед отправкой
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        if (password !== confirm) {
            e.preventDefault();
            alert('Пароли не совпадают');
            return false;
        }
        
        if (password.length < 6) {
            e.preventDefault();
            alert('Пароль должен содержать минимум 6 символов');
            return false;
        }
    });
</script>
{% endblock %}
